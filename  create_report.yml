apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: create-report
  description: >-
    Create a report for your Red Hat Enterprise Linux systems.
  namespace: default
  tags:
    - operations
    - rhel
spec:
  type: service
  presentation:
    buttonLabels:
      backButtonText: 'Return'
      createButtonText: 'Create'
      reviewButtonText: 'Verify'
  parameters:
    - title: Settings
      required:
        - token
        - inventory
        - credentials
        - ntpServers
        - serviceRestartConfirmation
      properties:
        token:
          title: 🔑 Access Token
          type: string
          ui:field: AAPTokenField
          ui:widget: hidden
          ui:backstage:
            review:
              show: false
        inventory:
          title: 🗂️ Server Group
          description: Choose the group of servers you want to update.
          resource: inventories
          ui:field: AAPResourcePicker
        credentials:
          title: 🔐 Login Credentials
          description: Select the credentials needed to connect to your servers.
          type: array
          ui:field: AAPResourcePicker
          resource: credentials
        ntpServers:
          title: 🌐 NTP Servers
          type: string
          description: Enter a comma-separated list of time servers.
          default: 0.rhel.pool.ntp.org, 1.rhel.pool.ntp.org
          pattern: '^([a-zA-Z0-9.\-]+)(,\s*[a-zA-Z0-9.\-]+)*$'
          errorMessage:
            pattern: 'Please enter a valid, comma-separated list of time servers.'
        timezone:
          title: 🌍 Timezone
          type: string
          description: 'Set the timezone for your servers, for example: UTC or America/New_York.'
          default: UTC
        serviceRestartConfirmation:
          title: 🔄 Restart Time Service?
          type: string
          default: 'Yes'
          enum:
            - 'Yes'
            - 'No'
      dependencies:
        serviceRestartConfirmation:
          oneOf:
            - properties:
                serviceRestartConfirmation:
                  const: 'Yes'
                restartReason:
                  type: string
                  title: 📝 Reason for Restart
                  description: Please provide a reason for restarting the time service.
                  default: "Applying new time server configuration."
                  minLength: 10
                  errorMessage:
                    minLength: 'Please provide a more detailed reason (at least 10 characters).'
            - properties:
                serviceRestartConfirmation:
                  const: 'No'

  steps:
    - id: launch-job
      name: Update Time Servers
      action: rhaap:launch-job-template
      input:
        token: ${{ parameters.token }}
        values:
          template: RHEL / Update RHEL Time Servers
          inventory: ${{ parameters.inventory }}
          credentials: ${{ parameters.credentials }}
          extraVariables:
            user_ntp_servers: ${{ parameters.ntpServers }}
            user_timezone: ${{ parameters.timezone }}
            restart_chronyd_service: ${{ parameters.serviceRestartConfirmation }}
            restart_reason: ${{ parameters.restartReason }}

    - id: print-url
      name: Print URL
      action: rhaap:launch-job-template
      input:
        token: ${{ parameters.token }}
        values:
          template: Print URL
          extraVariables:
            report_url: ${{ steps['launch-job'].output.data.url }}

  output:
    text:
      - title: Report Created!
        content: |
          **Job ID:** ${{ steps['launch-job'].output.data.id }}
          **Status:** ${{ steps['launch-job'].output.data.status }}
    links:
      - title: 📊 Open Report
        url: ${{ steps['print-url'].output.data.artifacts.exposed_report_url }}
        icon: dashboard